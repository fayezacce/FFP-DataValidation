worker_processes auto;
events {
    worker_connections 4096;
}

http {
    # ── Performance ─────────────────────────────────────────────────────────
    keepalive_timeout 65;
    client_body_buffer_size 10M;
    client_max_body_size 25M;
    sendfile on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # ── Security: hide version ───────────────────────────────────────────────
    server_tokens off;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

    server {
        listen 3000;

        # ── Access Control (192.168.72.x Subnet) ──────────────────────────────
        allow 192.168.72.0/24;
        allow 127.0.0.1;
        allow 172.16.0.0/12; # Allow internal docker networking
        deny all;

        # ── Security Headers ─────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" always;

        # ── Trust Private IPs for X-Real-IP ──────────────────────────────────
        set_real_ip_from 10.0.0.0/8;
        set_real_ip_from 172.16.0.0/12;
        set_real_ip_from 192.168.0.0/16;
        real_ip_header X-Real-IP;
        real_ip_recursive on;

        # ── Frontend (Next.js) ───────────────────────────────────────────────
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Backend API ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── File Uploads (stricter rate limit) ───────────────────────────────
        location /api/validate {
            limit_req zone=upload_limit burst=3 nodelay;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            client_max_body_size 25M;
        }

        # ── File Downloads (Removed from Nginx, served via authenticated FastAPI) ──
        # location /downloads/ block removed for security (Item C-5)

        # ── Health check (no rate limit, no auth needed) ─────────────────────
        location /api/health {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            access_log off;
        }
    }
}

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=fayez
      - POSTGRES_PASSWORD=fayez_secret
      - POSTGRES_DB=ffp_validator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    build:
      context: ./backend
    # Port 8000 NOT exposed externally - only reachable inside docker network via nginx
    environment:
      - MAX_UPLOAD_SIZE=20971520 # 20MB
      - DATABASE_URL=postgresql://fayez:fayez_secret@db:5432/ffp_validator
    volumes:
      - backend_downloads:/app/downloads
      - backend_uploads:/app/uploads
    depends_on:
      - db
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
    # Port 3000 NOT exposed externally - only reachable inside docker network via nginx
    depends_on:
      - backend
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    ports:
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_network
    restart: unless-stopped

volumes:
  backend_downloads:
  backend_uploads:
  postgres_data:

networks:
  app_network:
    driver: bridge

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fayez}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fayez_secret}
      - POSTGRES_DB=${POSTGRES_DB:-ffp_validator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    image: ghcr.io/fayezacce/ffp-datavalidation/backend:latest
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fayez}:${POSTGRES_PASSWORD:-fayez_secret}@db:5432/${POSTGRES_DB:-ffp_validator}
      - JWT_SECRET=${JWT_SECRET}
      - MAX_UPLOAD_SIZE=20971520
    volumes:
      - backend_downloads:/app/downloads
      - backend_uploads:/app/uploads
    depends_on:
      - db
    networks:
      - app_network

  frontend:
    image: ghcr.io/fayezacce/ffp-datavalidation/frontend:latest
    restart: always
    depends_on:
      - backend
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:3000" # Mapping production port 80 to nginx 3000
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_network
    restart: unless-stopped

volumes:
  backend_downloads:
  backend_uploads:
  postgres_data:

networks:
  app_network:
    driver: bridge

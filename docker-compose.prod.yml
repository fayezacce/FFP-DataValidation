

services:
  # ── Database ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15.6-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fayez}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-ffp_validator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fayez} -d ${POSTGRES_DB:-ffp_validator}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── Automated Daily DB Backup ──────────────────────────────────────────────
  db-backup:
    image: postgres:15.6-alpine
    restart: always
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-fayez}
      - POSTGRES_DB=${POSTGRES_DB:-ffp_validator}
    volumes:
      - ./db_backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    # Run pg_dump daily at 02:00 UTC, keep last 30 backups
    entrypoint: >
      sh -c "
        while true; do
          BACKUP_FILE=\"/backups/ffp_backup_$$(date +%Y%m%d_%H%M%S).sql.gz\";
          pg_dump -h db -U $$POSTGRES_USER $$POSTGRES_DB | gzip > $$BACKUP_FILE;
          echo \"[backup] Created $$BACKUP_FILE\";
          ls -t /backups/ffp_backup_*.sql.gz | tail -n +31 | xargs -r rm -- ;
          sleep 86400;
        done
      "

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    image: ghcr.io/fayezacce/ffp-datavalidation/backend:latest
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fayez}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-ffp_validator}
      - JWT_SECRET=${JWT_SECRET}
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-20971520}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER:-fayez}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-ffp_validator}
    volumes:
      - backend_downloads:/app/downloads
      - backend_uploads:/app/uploads
      - ./db_backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 2G

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    image: ghcr.io/fayezacce/ffp-datavalidation/frontend:latest
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── PgBouncer Connection Pooler ────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: always
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-fayez}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ffp_validator}
      - LISTEN_PORT=6432
      - POOL_MODE=transaction
      # trust = no password required from internal Docker network.
      # PostgreSQL's own pg_hba.conf handles the real auth at the DB level.
      - AUTH_TYPE=scram-sha-256
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=20
      - MAX_DB_CONNECTIONS=80
      - SERVER_RESET_QUERY=DISCARD ALL
    healthcheck:
      # Use pg_isready to probe the pgbouncer port
      test: ["CMD-SHELL", "pg_isready -p 6432 -h localhost -U ${POSTGRES_USER:-fayez}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

volumes:
  backend_downloads:
  backend_uploads:
  postgres_data:


networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.72.0/24
